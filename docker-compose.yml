services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: ["sh", "-c", "pnpm --filter backend db:migrate:deploy && pnpm --filter backend dev"]
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      DATABASE_URL: file:../data/dev.db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_ENV: development
      PORT: 4000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:4000/graphql',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({query:'{ __typename }'})}).then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - .:/app
      - /app/node_modules
      - /app/backend/node_modules
      - /app/frontend/node_modules
      - backend-data:/app/backend/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: ["pnpm", "--filter", "frontend", "dev"]
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      VITE_BACKEND_URL: http://localhost:4000/graphql
    volumes:
      - .:/app
      - /app/node_modules
      - /app/backend/node_modules
      - /app/frontend/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
